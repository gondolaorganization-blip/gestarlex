version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gestarlex_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gestarlex
      POSTGRES_PASSWORD: gestarlex_pass
      POSTGRES_DB: gestarlex_db
    ports:
      - "5432:5432"
    volumes:
      - gestarlex_pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gestarlex_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gestarlex.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  gestarlex_pgdata:
