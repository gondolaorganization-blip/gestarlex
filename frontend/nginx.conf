# ─── HTTP — redirect a HTTPS + ACME challenge ────────────────────────────────
server {
    listen 80;
    server_name gestarsoft.com www.gestarsoft.com;

    # Let's Encrypt — desafío de validación
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://gestarsoft.com$request_uri;
    }
}

# ─── HTTPS www → naked domain ─────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name www.gestarsoft.com;

    ssl_certificate     /etc/letsencrypt/live/gestarsoft.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gestarsoft.com/privkey.pem;

    return 301 https://gestarsoft.com$request_uri;
}

# ─── HTTPS principal ──────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name gestarsoft.com;

    ssl_certificate     /etc/letsencrypt/live/gestarsoft.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gestarsoft.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    root /usr/share/nginx/html;

    # ── Frontend React SPA bajo /lex ─────────────────────────────────────────
    # Los archivos del build están en /usr/share/nginx/html/lex/
    # try_files sirve el archivo estático si existe, si no → index.html (SPA routing)
    location /lex {
        try_files $uri $uri/ /lex/index.html;
    }

    # Assets con caché larga (Vite genera nombres con hash)
    location ~* ^/lex/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Backend API ──────────────────────────────────────────────────────────
    location /api {
        proxy_pass         http://backend:3099;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 30M;
    }

    # ── Raíz → /lex ──────────────────────────────────────────────────────────
    location = / {
        return 301 /lex/;
    }
}
